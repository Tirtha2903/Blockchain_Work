<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Stellar Wallet</h1>
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Create New Account</h5>
        <p class="card-text">Generate a new Stellar account and fund it with test XLM.</p>
        <button id="createAccount" class="btn btn-primary">Create Account</button>
      </div>
    </div>
    <div id="accountInfo" class="card mb-4" style="display:none;">
      <div class="card-body">
        <h5 class="card-title">Your Account</h5>
        <p><strong>Public Key:</strong> <span id="publicKey"></span></p>
        <p><strong>Secret Key:</strong> <span id="secret" class="text-danger"></span> <small>(Keep this safe!)</small></p>
        <button id="checkBalance" class="btn btn-info">Check Balance</button>
        <p class="mt-2"><strong>Balance:</strong> <span id="balance">0</span> XLM</p>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Send Payment</h5>
        <div class="mb-3">
          <input type="text" id="senderSecret" class="form-control" placeholder="Your Secret Key">
        </div>
        <div class="mb-3">
          <input type="text" id="destination" class="form-control" placeholder="Destination Public Key">
        </div>
        <div class="mb-3">
          <input type="number" id="amount" class="form-control" placeholder="Amount in XLM" step="0.0000001">
        </div>
        <button id="sendPayment" class="btn btn-success">Send Payment</button>
        <p id="transactionResult" class="mt-3 text-success"></p>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/stellar-sdk@10.4.0/dist/stellar-sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
